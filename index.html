<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>JS Challenge # 1</title>
    <script src="index.js"></script>
</head>
<body>
    <div class="keys">
       <div data-key="65" class="key">
           <kdb>A</kdb>
           <span class="sound">Clap</span>
       </div>

       <div data-key="83" class="key">
        <kdb>S</kdb>
        <span class="sound">Clap</span>
    </div>

    <div data-key="68" class="key">
        <kdb>D</kdb>
        <span class="sound">Clap</span>
    </div>

    <div data-key="70" class="key">
        <kdb>F</kdb>
        <span class="sound">Clap</span>
    </div>

    <div data-key="71" class="key">
        <kdb>G</kdb>
        <span class="sound">Clap</span>
    </div>

    <div data-key="72" class="key">
        <kdb>H</kdb>
        <span class="sound">Clap</span>
    </div>

    <div data-key="74" class="key">
        <kdb>J</kdb>
        <span class="sound">Clap</span>
    </div>

    <div data-key="75" class="key">
        <kdb>K</kdb>
        <span class="sound">Clap</span>
    </div>

    <div data-key="76" class="key">
        <kdb>L</kdb>
        <span class="sound">Clap</span>
    </div>

    </div>

    <!-- If we want to have our own attribute we can prepend the data with it. Like we can even 
    use data-rana instead of data-key -->

    <audio data-key="65" src="./sounds/clap.wav"></audio>
    <audio data-key="82" src="./sounds/boom.wav"></audio>
    <audio data-key="68" src="./sounds/hihat.wav"></audio>
    <audio data-key="70" src="./sounds/kick.wav"></audio>
    <audio data-key="71" src="./sounds/openhat.wav"></audio>
    <audio data-key="72" src="./sounds/ride.wav"></audio>
    <audio data-key="74" src="./sounds/snare.wav"></audio>
    <audio data-key="75" src="./sounds/tink.wav"></audio>
    <audio data-key="76" src="./sounds/tom.wav"></audio>
</body>

</html>
